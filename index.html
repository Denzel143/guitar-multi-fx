<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuitarFX-S3 — USB Controller</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e;--metal-hi:#3a3530;
  --text:#c8c0b4;--text-dim:#6a6460;--text-val:#f0e8d0;
  --led-off:#2a1810;--accent-yl:#e0c040;
  --hdr:52px;  /* header height — used in calc() */
}

/* ── BASE: no body scroll, layout fills viewport ─────────── */
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);
  font-family:'Barlow Condensed',sans-serif;cursor:default;user-select:none}
body::before{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:200px;pointer-events:none;z-index:9999;opacity:.4}

/* ── HEADER ─────────────────────────────────────────────── */
header{
  height:var(--hdr);display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:linear-gradient(180deg,#1a1814 0%,#121010 100%);
  border-bottom:1px solid #3a3228;
  box-shadow:0 4px 24px rgba(0,0,0,.7);
  position:relative;z-index:100;flex-shrink:0;gap:12px}
.logo{display:flex;align-items:baseline;gap:8px}
.logo-main{font-size:1.7rem;font-weight:900;letter-spacing:.08em;color:var(--text-val);
  text-shadow:0 0 24px rgba(240,180,60,.18)}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--text-dim);letter-spacing:.2em}
.header-right{display:flex;align-items:center;gap:12px}
.ble-status{display:flex;align-items:center;gap:7px;
  font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--text-dim)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--led-off);
  box-shadow:0 0 0 2px #1a1814;transition:background .3s,box-shadow .3s}
.status-dot.conn{background:#40f080;box-shadow:0 0 10px #40f08088,0 0 3px #fff}
.status-dot.scan{background:var(--accent-yl);box-shadow:0 0 10px #e0c04088;
  animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#statusLabel{min-width:86px}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{padding:6px 16px;border:none;border-radius:3px;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;
  letter-spacing:.12em;text-transform:uppercase;
  background:linear-gradient(180deg,#3a3028 0%,#1e1a14 100%);
  color:var(--text-val);border:1px solid #4a4038;
  box-shadow:0 2px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
  transition:all .15s}
.btn:hover{background:linear-gradient(180deg,#504540 0%,#2e2820 100%);color:#fff}
.btn:active{transform:translateY(1px)}
.btn.connected{border-color:#40f08060;color:#80f0a0}
.btn-sm{padding:4px 12px;font-size:.75rem}

/* ══════════════════════════════════════════════════════════
   MAIN TWO-COLUMN LAYOUT
   Left  : pedalboard (scrollable)
   Right : YT player + controls + search bar (fixed) + results (scrollable)
══════════════════════════════════════════════════════════ */
.app-body{
  display:grid;
  grid-template-columns:1fr 360px;
  height:calc(100vh - var(--hdr));
  overflow:hidden}

/* ── LEFT COLUMN ─────────────────────────────────────────── */
.left-col{
  overflow-y:auto;
  overflow-x:hidden;
  padding:12px 14px 20px;
  scrollbar-width:thin;
  scrollbar-color:#3a3530 transparent}
.left-col::-webkit-scrollbar{width:4px}
.left-col::-webkit-scrollbar-thumb{background:#3a3530;border-radius:2px}

/* ── RIGHT COLUMN ────────────────────────────────────────── */
.right-col{
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border-left:1px solid #252220;
  background:#0c0b0a}

/* YouTube player — fixed 16:9, never scrolls */
.yt-wrap{
  position:relative;
  width:100%;
  padding-bottom:56.25%;   /* 16:9 */
  background:#000;
  flex-shrink:0}
.yt-wrap iframe,
#ytPlayerDiv{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.no-video{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--text-dim);font-size:.78rem;letter-spacing:.12em;text-align:center;gap:6px}
.no-video-icon{font-size:2rem;opacity:.25}
.now-playing{
  padding:5px 12px;font-size:.68rem;letter-spacing:.04em;color:var(--text-dim);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:#0a0908;border-bottom:1px solid #1a1814;flex-shrink:0}

/* Player controls — fixed, never scrolls */
.player-controls{
  padding:10px 14px 8px;background:#0e0c0a;
  border-bottom:1px solid #1a1814;flex-shrink:0}
.ctrl-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.ctrl-btn{
  width:34px;height:34px;border-radius:50%;border:1.5px solid #3a3530;
  background:linear-gradient(160deg,#2e2a26 0%,#1a1814 100%);
  color:var(--text-val);font-size:.95rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.5);transition:all .12s;
  font-family:inherit;flex-shrink:0}
.ctrl-btn:hover{border-color:#f06020;background:linear-gradient(160deg,#3a3028,#252018)}
.ctrl-btn:active{transform:scale(.93)}
.ctrl-btn.play-pause{width:42px;height:42px;font-size:1.1rem;border-color:#f06020}
.seek-wrap{margin-bottom:6px}
.seek-slider{
  width:100%;height:4px;-webkit-appearance:none;appearance:none;
  background:linear-gradient(90deg,#f06020 var(--pct,0%),#252220 var(--pct,0%));
  border-radius:2px;cursor:pointer;outline:none}
.seek-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:#f06020;box-shadow:0 0 6px #f0602088;cursor:pointer}
.seek-slider::-moz-range-thumb{width:12px;height:12px;border:none;border-radius:50%;
  background:#f06020;cursor:pointer}
.time-row{display:flex;align-items:center;justify-content:space-between;
  font-family:'Share Tech Mono',monospace;font-size:.68rem}
.time-cur{color:#f06020}
.time-rem{color:var(--text-val)}
.time-tot{color:var(--text-dim)}

/* Search bar — fixed, never scrolls */
.search-bar{
  padding:8px 10px;background:#111009;
  border-bottom:1px solid #1e1c18;flex-shrink:0;
  display:flex;flex-direction:column;gap:6px}
.search-row{display:flex;gap:6px;align-items:center}
.search-input{
  font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--text-val);
  background:#0a0908;border:1px solid #2a2620;border-radius:3px;
  padding:5px 8px;outline:none;user-select:text;cursor:text;
  transition:border-color .12s;flex:1;min-width:0}
.search-input:focus{border-color:#f06020}
.search-input::placeholder{color:var(--text-dim);font-style:italic}
.capture-row{display:flex;align-items:center;gap:8px}
.uac-dot{width:6px;height:6px;border-radius:50%;background:#2a2820;
  box-shadow:0 0 0 1.5px #1a1814;transition:background .3s;flex-shrink:0}
.uac-dot.stream{background:#30c080;box-shadow:0 0 8px #30c08088}
.stream-stats{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--text-dim)}

/* Results — ONLY scrollable section on the right */
.results-pane{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:thin;
  scrollbar-color:#3a3530 transparent}
.results-pane::-webkit-scrollbar{width:4px}
.results-pane::-webkit-scrollbar-thumb{background:#3a3530;border-radius:2px}
.results-header{
  padding:7px 12px;
  font-size:.6rem;letter-spacing:.3em;color:var(--text-dim);
  text-transform:uppercase;
  border-bottom:1px solid #181614;
  background:#0e0c0a;
  position:sticky;top:0;z-index:1}
.result-item{
  display:flex;gap:9px;padding:9px 12px;cursor:pointer;
  border-bottom:1px solid #141210;transition:background .1s;align-items:flex-start}
.result-item:hover{background:#171510}
.result-item.active{background:#191510;border-left:2px solid #f06020}
.result-thumb{width:76px;height:43px;object-fit:cover;border-radius:2px;
  flex-shrink:0;background:#1a1814}
.result-info{flex:1;min-width:0}
.result-title{font-size:.72rem;font-weight:600;letter-spacing:.02em;color:var(--text-val);
  line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;margin-bottom:2px}
.result-meta{font-family:'Share Tech Mono',monospace;font-size:.56rem;color:var(--text-dim)}
.results-empty{padding:28px 16px;text-align:center;color:var(--text-dim);
  font-size:.72rem;letter-spacing:.1em}

/* ── LEFT: section label ─────────────────────────────────── */
.section-label{font-size:.65rem;letter-spacing:.3em;color:var(--text-dim);
  text-transform:uppercase;margin-bottom:8px}

/* ── SIGNAL PATH ─────────────────────────────────────────── */
.sig-path{display:flex;align-items:center;overflow-x:auto;
  scrollbar-width:none;margin-bottom:10px}
.sig-path::-webkit-scrollbar{display:none}
.sig-node{font-family:'Share Tech Mono',monospace;font-size:.54rem;letter-spacing:.1em;
  color:var(--text-dim);padding:3px 5px;border:1px solid #252220;border-radius:2px;
  white-space:nowrap;transition:color .2s,border-color .2s;flex-shrink:0}
.sig-node.on{color:var(--accent-color,#f06020);border-color:var(--accent-color,#f06020)}
.sig-arrow{color:#2a2820;font-size:.65rem;flex-shrink:0;padding:0 1px}
.sig-arrow.on{color:#4a4030}

/* ── PEDALBOARD ──────────────────────────────────────────── */
.pedalboard{
  background:
    repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 4px),
    repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 4px),
    linear-gradient(180deg,#1a1208 0%,#120e06 100%);
  border:3px solid #3a2c18;border-radius:8px;padding:12px;
  box-shadow:0 8px 40px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.04);
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
  margin-bottom:16px}

/* ── PEDAL ───────────────────────────────────────────────── */
.pedal{position:relative;
  background:linear-gradient(160deg,#2e2a26 0%,#1e1c18 60%,#181614 100%);
  border-radius:5px;border:1px solid var(--metal-hi);
  box-shadow:0 4px 14px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06);
  display:flex;flex-direction:column;align-items:center;
  padding:9px 7px 10px;gap:6px;transition:box-shadow .15s;
  animation:pedalIn .4s ease both}
@keyframes pedalIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.pedal:nth-child(1){animation-delay:.04s}.pedal:nth-child(2){animation-delay:.08s}
.pedal:nth-child(3){animation-delay:.12s}.pedal:nth-child(4){animation-delay:.16s}
.pedal:nth-child(5){animation-delay:.20s}.pedal:nth-child(6){animation-delay:.24s}
.pedal:nth-child(7){animation-delay:.28s}.pedal:nth-child(8){animation-delay:.32s}
.pedal:nth-child(9){animation-delay:.36s}.pedal:nth-child(10){animation-delay:.40s}
.pedal.active{box-shadow:0 4px 14px rgba(0,0,0,.7),0 0 16px -3px var(--accent-color,#f06020),inset 0 1px 0 rgba(255,255,255,.06)}
.pedal::before{content:'';position:absolute;top:0;left:10px;right:10px;height:2px;
  background:var(--accent-color,#f06020);border-radius:0 0 2px 2px;opacity:.3;transition:opacity .2s}
.pedal.active::before{opacity:1}
.pedal::after{content:'';position:absolute;inset:4px;border-radius:3px;pointer-events:none;
  background:
    radial-gradient(circle 3px at 5px 5px,#4a4540 60%,transparent 61%),
    radial-gradient(circle 3px at calc(100% - 5px) 5px,#4a4540 60%,transparent 61%),
    radial-gradient(circle 3px at 5px calc(100% - 5px),#4a4540 60%,transparent 61%),
    radial-gradient(circle 3px at calc(100% - 5px) calc(100% - 5px),#4a4540 60%,transparent 61%)}
.pedal-top{display:flex;align-items:center;justify-content:space-between;width:100%;padding:0 4px}
.pedal-name{font-size:.62rem;font-weight:700;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase}
.pedal.active .pedal-name{color:var(--text-val)}
.footswitch-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.led{width:6px;height:6px;border-radius:50%;background:var(--led-off);
  box-shadow:0 0 0 1.5px #1a1814;transition:background .2s,box-shadow .2s}
.pedal.active .led{background:var(--accent-color,#f06020);box-shadow:0 0 7px var(--accent-color,#f06020),0 0 2px #fff}
.footswitch{width:24px;height:24px;border-radius:50%;
  background:radial-gradient(circle at 38% 38%,#5a5450 0%,#2a2820 50%,#1a1816 100%);
  border:1.5px solid #4a4540;box-shadow:0 3px 6px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.08);
  cursor:pointer;transition:transform .07s,box-shadow .1s;position:relative}
.footswitch::after{content:'';position:absolute;width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.09);top:3px;left:4px}
.footswitch:active,.pedal.active .footswitch{transform:translateY(1.5px);
  box-shadow:0 1px 3px rgba(0,0,0,.6),inset 0 1px 3px rgba(0,0,0,.4)}
.knobs-row{display:flex;flex-wrap:wrap;justify-content:center;gap:5px 4px;width:100%}
.knob-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:50px;max-width:68px}
.knob-label{font-size:.52rem;letter-spacing:.12em;color:var(--text-dim);
  text-transform:uppercase;text-align:center}
.knob-drag{cursor:ns-resize}
.knob-svg{display:block;overflow:visible}
.param-inputs{display:flex;flex-direction:column;gap:2px;width:100%}
.input-row{display:flex;align-items:center;gap:2px;width:100%}
.input-unit{font-family:'Share Tech Mono',monospace;font-size:.48rem;color:var(--text-dim);
  white-space:nowrap;flex-shrink:0;max-width:26px;overflow:hidden}
.param-input{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--text-val);
  background:#131110;border:1px solid #252220;border-radius:2px;
  padding:2px 3px;width:100%;min-width:0;text-align:right;outline:none;
  cursor:text;user-select:text;transition:border-color .12s,background .12s;
  -moz-appearance:textfield}
.param-input::-webkit-outer-spin-button,.param-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.param-input:hover{border-color:#3a3530;background:#1a1814}
.param-input:focus{border-color:var(--accent-color,#f06020);background:#1c1814}
.param-input.pct{color:var(--text-dim)}
.param-input.pct:focus{color:var(--text-val)}
.param-select{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;
  letter-spacing:.06em;background:#1a1814;color:var(--text);border:1px solid #3a3530;
  border-radius:3px;padding:2px 4px;cursor:pointer;text-transform:uppercase;
  outline:none;appearance:none;width:100%;text-align:center}
.param-select:focus{border-color:var(--accent-color,#f06020)}

/* ── PRESETS ─────────────────────────────────────────────── */
.presets-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.preset-slot{background:linear-gradient(160deg,#252220 0%,#1a1814 100%);
  border:1px solid #3a3530;border-radius:4px;padding:8px 10px;
  display:flex;flex-direction:column;gap:5px}
.preset-name-row{display:flex;align-items:center;gap:5px}
.preset-num{font-size:.68rem;font-weight:700;letter-spacing:.2em;color:var(--accent-yl);flex-shrink:0}
.preset-name{background:transparent;border:none;border-bottom:1px solid #3a3530;
  color:var(--text-val);font-family:'Barlow Condensed',sans-serif;
  font-size:.82rem;font-weight:600;letter-spacing:.04em;
  width:100%;padding:1px 0;outline:none;user-select:text}
.preset-name:focus{border-bottom-color:var(--accent-yl)}
.preset-btns{display:flex;gap:5px}
.preset-btn{flex:1;padding:4px 0;border:1px solid #3a3530;border-radius:2px;
  background:#1a1814;color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;
  font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  cursor:pointer;transition:all .12s}
.preset-btn:hover{background:#2a2820;color:var(--text-val);border-color:#6a6050}
.preset-btn.load:hover{border-color:var(--accent-yl);color:var(--accent-yl)}
.preset-btn.save:hover{border-color:#30c080;color:#30c080}

/* ── TOAST ───────────────────────────────────────────────── */
#toast{position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:#2a2820;border:1px solid #4a4038;border-radius:4px;
  padding:9px 20px;font-size:.8rem;letter-spacing:.1em;color:var(--text-val);
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  transition:transform .25s cubic-bezier(.22,1,.36,1);z-index:10000}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <span class="logo-main">GuitarFX</span>
    <span class="logo-sub">ESP32-S3 · USB</span>
  </div>
  <div class="header-right">
    <div class="ble-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusLabel">DISCONNECTED</span>
    </div>
    <button class="btn" id="btnConnect" onclick="toggleUSB()">CONNECT USB</button>
  </div>
</header>

<!-- ── MAIN LAYOUT ─────────────────────────────────────────── -->
<div class="app-body">

  <!-- ═══ LEFT: Pedalboard (scrollable) ═══════════════════ -->
  <div class="left-col">

    <div class="section-label" style="margin-bottom:6px">⬡ SIGNAL CHAIN</div>
    <div class="sig-path" id="sigPath"></div>

    <div class="section-label">⬡ EFFECTS</div>
    <div class="pedalboard" id="pedalboard"></div>

    <div class="section-label">⬡ PRESETS</div>
    <div class="presets-bar" id="presetBar"></div>

  </div>

  <!-- ═══ RIGHT: YouTube + Search ════════════════════════ -->
  <div class="right-col">

    <!-- YouTube iFrame — fixed 16:9 -->
    <div class="yt-wrap">
      <div id="ytPlayerDiv"></div>
      <div class="no-video" id="noVideo">
        <span class="no-video-icon">🎬</span>
        SEARCH BELOW AND SELECT A SONG
      </div>
    </div>

    <!-- Now playing -->
    <div class="now-playing" id="nowPlaying" style="display:none"></div>

    <!-- Player controls — fixed -->
    <div class="player-controls">
      <div class="ctrl-row">
        <button class="ctrl-btn" onclick="seekRel(-5)" title="Rewind 5s">⟨ 5s</button>
        <button class="ctrl-btn play-pause" id="btnPlayPause" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="seekRel(10)" title="Forward 10s">10s ⟩</button>
      </div>
      <div class="seek-wrap">
        <input class="seek-slider" id="seekSlider" type="range" min="0" max="100"
          value="0" step="0.1"
          oninput="onSeekInput(this)" onchange="onSeekChange(this)"
          style="--pct:0%">
      </div>
      <div class="time-row">
        <span class="time-cur" id="timeCur">0:00</span>
        <span class="time-rem" id="timeRem">–</span>
        <span class="time-tot" id="timeTot">0:00</span>
      </div>
    </div>

    <!-- Search bar — fixed -->
    <div class="search-bar">
      <div class="search-row">
<input class="search-input" id="searchInput"
          placeholder="Search YouTube to jam…"
          onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn btn-sm" onclick="doSearch()">GO</button>
      </div>
      <div class="capture-row">
        <button class="btn btn-sm" id="btnCapture" onclick="toggleCapture()">▶ CAPTURE TAB</button>
        <div class="uac-dot" id="uacDot"></div>
        <span class="stream-stats" id="streamStats"></span>
      </div>
    </div>

    <!-- Results — ONLY scrollable section on the right -->
    <div class="results-pane">
      <div class="results-header" id="resultsHeader">NO RESULTS YET</div>
      <div id="resultsList">
        <div class="results-empty">Search for a song above to start jamming</div>
      </div>
    </div>

  </div><!-- /right-col -->
</div><!-- /app-body -->

<div id="toast"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
/* ─── USB SERIAL ────────────────────────────────────────── */
const RESP_MAGIC_0=0xFA,RESP_MAGIC_1=0xCB,RESP_TOTAL=62;
const CMD_TOGGLE=0x00,CMD_SET_PARAM=0x01,CMD_LOAD=0x02,CMD_SAVE=0x03,CMD_GET=0x04;
let serialPort=null,serialReader=null;
let rxBuf=new Uint8Array(0);

async function toggleUSB(){
  if(serialPort){await disconnectUSB();return;}
  if(!navigator.serial){toast('Web Serial not supported. Use Chrome or Edge.');return;}
  setStatus('scan','PAIRING…');
  try{
    serialPort=await navigator.serial.requestPort({filters:[{usbVendorId:0x303A}]});
    await serialPort.open({baudRate:115200});
    setStatus('conn','CONNECTED');
    document.getElementById('btnConnect').textContent='DISCONNECT';
    document.getElementById('btnConnect').classList.add('connected');
    startSerialRead();
    await serialSend(new Uint8Array([CMD_GET,0,0,0]));
    toast('USB connected — syncing state…');
  }catch(e){
    serialPort=null;setStatus('off','DISCONNECTED');
    if(e.name!=='NotFoundError') toast('Serial error: '+e.message);
  }
}
async function disconnectUSB(){
  try{if(serialReader){await serialReader.cancel();serialReader=null;}}catch(e){}
  try{if(serialPort){await serialPort.close();}}catch(e){}
  serialPort=null;
  setStatus('off','DISCONNECTED');
  document.getElementById('btnConnect').textContent='CONNECT USB';
  document.getElementById('btnConnect').classList.remove('connected');
  toast('USB disconnected');
}
async function startSerialRead(){
  try{
    serialReader=serialPort.readable.getReader();
    while(true){
      const{value,done}=await serialReader.read();
      if(done)break;
      if(value)appendRxBuf(value);
    }
  }catch(e){if(e.name!=='AbortError')console.warn('Serial read:',e);disconnectUSB();}
}
function appendRxBuf(inc){
  const nb=new Uint8Array(rxBuf.length+inc.length);
  nb.set(rxBuf);nb.set(inc,rxBuf.length);rxBuf=nb;
  while(rxBuf.length>=RESP_TOTAL){
    const i0=rxBuf.indexOf(RESP_MAGIC_0);
    if(i0===-1){rxBuf=new Uint8Array(0);break;}
    if(rxBuf.length<i0+RESP_TOTAL)break;
    if(rxBuf[i0+1]===RESP_MAGIC_1){applyStateBlob(rxBuf.slice(i0+2,i0+RESP_TOTAL).buffer);rxBuf=rxBuf.slice(i0+RESP_TOTAL);}
    else rxBuf=rxBuf.slice(i0+1);
  }
}
async function serialSend(bytes){
  if(!serialPort||!serialPort.writable)return;
  const w=serialPort.writable.getWriter();
  try{await w.write(bytes);}finally{w.releaseLock();}
}
function setStatus(type,label){
  document.getElementById('statusDot').className='status-dot'+(type==='conn'?' conn':type==='scan'?' scan':'');
  document.getElementById('statusLabel').textContent=label;
}

  toneHz2: {unit:'Hz', realMin:300, realMax:3300,realDec:0,toReal:p=>Math.round(300+p*30),         fromReal:v=>+(v-300)/30},

  relMs:   {unit:'ms', realMin:10,  realMax:500, realDec:0,toReal:p=>Math.round(500-p*4.9),         fromReal:v=>+(500-v)/4.9},

/* ─── SVG KNOB ──────────────────────────────────────────── */
function makeKnob(pct,color){
  const R=18,cx=20,cy=20,minA=-135,maxA=135;
  const angle=minA+(Math.min(100,Math.max(0,pct))/100)*(maxA-minA);
  const rad=a=>a*Math.PI/180;
  const pt=(r,a)=>({x:cx+r*Math.sin(rad(a)),y:cy-r*Math.cos(rad(a))});
  const s=pt(R,minA),e=pt(R,maxA),a=pt(R,angle),d=pt(10.5,angle);
  const large=(angle-minA)>180?1:0;
  const uid=(Math.random()*1e8|0).toString(36);
  return `<svg class="knob-svg" width="40" height="40" viewBox="0 0 40 40">
  <defs><radialGradient id="kg${uid}" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#3c3830"/><stop offset="100%" stop-color="#141210"/></radialGradient></defs>
  <path d="M${s.x.toFixed(2)} ${s.y.toFixed(2)} A${R} ${R} 0 1 1 ${e.x.toFixed(2)} ${e.y.toFixed(2)}" fill="none" stroke="#222018" stroke-width="3" stroke-linecap="round"/>
  <path d="M${s.x.toFixed(2)} ${s.y.toFixed(2)} A${R} ${R} 0 ${large} 1 ${a.x.toFixed(2)} ${a.y.toFixed(2)}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="${cx}" cy="${cy}" r="13" fill="#1e1c1a" stroke="#3a3530" stroke-width="1.5"/>
  <circle cx="${cx}" cy="${cy}" r="13" fill="url(#kg${uid})" opacity="0.7"/>
  <circle cx="${d.x.toFixed(2)}" cy="${d.y.toFixed(2)}" r="2.2" fill="${color}" opacity="0.95"/>
  <circle cx="${d.x.toFixed(2)}" cy="${d.y.toFixed(2)}" r="1.1" fill="#fff" opacity="0.45"/>
</svg>`;
}

const domId=(t,fxId,pid)=>`${t}_${fxId}_${pid}`;

function buildPedals(){
  const board=document.getElementById('pedalboard');
  board.innerHTML='';
  EFFECTS.forEach(fx=>{
    const div=document.createElement('div');
    div.className='pedal'+(fxState[fx.id].enabled?' active':'');
    div.style.setProperty('--accent-color',fx.color);
    div.dataset.fxId=fx.id;
    const knobsHTML=fx.params.map(pm=>{
      if(pm.type==='select'){
        const opts=pm.options.map((o,i)=>`<option value="${i}"${fxState[fx.id].p[pm.pid]===i?' selected':''}>${o}</option>`).join('');
        return `<div class="knob-wrap"><div class="knob-label">${pm.name}</div>
          <select class="param-select" onchange="onSelectChange(${fx.id},${pm.pid},+this.value)">${opts}</select></div>`;
      }
      const c=CONV[pm.conv],pct=fxState[fx.id].p[pm.pid],rVal=c.toReal(pct),isPct=pm.conv==='pct';
      const rStep=c.realDec>0?Math.pow(10,-c.realDec):1;
      return `<div class="knob-wrap">
        <div class="knob-label">${pm.name}</div>
        <div class="knob-drag" id="${domId('kw',fx.id,pm.pid)}"
          onmousedown="startDrag(event,${fx.id},${pm.pid})"
          ontouchstart="startDragTouch(event,${fx.id},${pm.pid})">${makeKnob(pct,fx.color)}</div>
        <div class="param-inputs">
          <div class="input-row">
            <input class="param-input pct" type="number"
              id="${domId('pi',fx.id,pm.pid)}" value="${pct}" min="0" max="100" step="1"
              oninput="onPctInput(${fx.id},${pm.pid},this)"
              onchange="onPctInput(${fx.id},${pm.pid},this)">
            <span class="input-unit">%</span></div>
          ${!isPct?`<div class="input-row">
            <input class="param-input real" type="number"
              id="${domId('ri',fx.id,pm.pid)}" value="${rVal}" min="${c.realMin}" max="${c.realMax}" step="${rStep}"
              oninput="onRealInput(${fx.id},${pm.pid},this)"
              onchange="onRealInput(${fx.id},${pm.pid},this)">
            <span class="input-unit">${c.unit}</span></div>`:''}
        </div></div>`;
    }).join('');
    div.innerHTML=`
      <div class="pedal-top">
        <span class="pedal-name">${fx.name}</span>
        <div class="footswitch-wrap" onclick="toggleFx(${fx.id})">
          <div class="led"></div><div class="footswitch"></div></div></div>
      <div class="knobs-row">${knobsHTML}</div>`;
    board.appendChild(div);
  });

}

/* ─── PARAM APPLY ───────────────────────────────────────── */
function applyParam(fxId,pid,pct,source){
  pct=Math.min(100,Math.max(0,Math.round(pct)));
  fxState[fxId].p[pid]=pct;
  const kw=document.getElementById(domId('kw',fxId,pid));
  if(kw){const fx=EFFECTS.find(f=>f.id===fxId);kw.innerHTML=makeKnob(pct,fx.color);}
  if(source!=='pct'){const pi=document.getElementById(domId('pi',fxId,pid));if(pi&&document.activeElement!==pi)pi.value=pct;}
  if(source!=='real'){const ri=document.getElementById(domId('ri',fxId,pid));
    if(ri&&document.activeElement!==ri){const fx=EFFECTS.find(f=>f.id===fxId);const pm=fx.params.find(p=>p.pid===pid);
      if(pm&&pm.conv)ri.value=CONV[pm.conv].toReal(pct);}}
  serialSend(new Uint8Array([CMD_SET_PARAM,fxId,pid,pct]));
}
function onPctInput(fxId,pid,el){
  let v=parseInt(el.value,10);if(isNaN(v))return;
  const clamped=Math.min(100,Math.max(0,v));
  if(clamped!==v) el.value=clamped;   // snap field back to limit
  applyParam(fxId,pid,clamped,'pct');
}
function onRealInput(fxId,pid,el){
  const fx=EFFECTS.find(f=>f.id===fxId),pm=fx&&fx.params.find(p=>p.pid===pid);
  if(!pm||!pm.conv)return;
  const c=CONV[pm.conv];let v=parseFloat(el.value);if(isNaN(v))return;
  const clamped=Math.min(c.realMax,Math.max(c.realMin,v));
  if(clamped!==v) el.value=c.realDec>0?clamped.toFixed(c.realDec):clamped; // snap back
  applyParam(fxId,pid,Math.min(100,Math.max(0,Math.round(c.fromReal(clamped)))),'real');
}
function onSelectChange(fxId,pid,value){fxState[fxId].p[pid]=value;serialSend(new Uint8Array([CMD_SET_PARAM,fxId,pid,value]));}

/* ─── KNOB DRAG ─────────────────────────────────────────── */
let drag=null;
function startDrag(e,fxId,pid){e.preventDefault();drag={fxId,pid,startY:e.clientY,startVal:fxState[fxId].p[pid]};
  document.addEventListener('mousemove',onDrag);document.addEventListener('mouseup',endDrag);}
function startDragTouch(e,fxId,pid){const t=e.touches[0];drag={fxId,pid,startY:t.clientY,startVal:fxState[fxId].p[pid]};
  document.addEventListener('touchmove',onDragTouch,{passive:false});document.addEventListener('touchend',endDragTouch);}
function onDrag(e){if(!drag)return;applyParam(drag.fxId,drag.pid,Math.round(Math.min(100,Math.max(0,drag.startVal+(drag.startY-e.clientY)))),'drag');}
function onDragTouch(e){e.preventDefault();if(!drag)return;applyParam(drag.fxId,drag.pid,Math.round(Math.min(100,Math.max(0,drag.startVal+(drag.startY-e.touches[0].clientY)))),'drag');}
function endDrag(){drag=null;document.removeEventListener('mousemove',onDrag);document.removeEventListener('mouseup',endDrag);}
function endDragTouch(){drag=null;document.removeEventListener('touchmove',onDragTouch);document.removeEventListener('touchend',endDragTouch);}

function toggleFx(fxId){
  fxState[fxId].enabled=!fxState[fxId].enabled;
  const on=fxState[fxId].enabled;
  const pedal=document.querySelector(`[data-fx-id="${fxId}"]`);if(pedal)pedal.classList.toggle('active',on);
  const node=document.querySelector(`[data-fx-node="${fxId}"]`);if(node)node.classList.toggle('on',on);
  const arr=document.querySelector(`[data-fx-arrow="${fxId}"]`);if(arr)arr.classList.toggle('on',on);
  serialSend(new Uint8Array([CMD_TOGGLE,fxId,0,0]));
}
function loadPreset(slot){serialSend(new Uint8Array([CMD_LOAD,slot,0,0]));toast(`Preset ${slot+1} loaded`);}
function savePreset(slot){serialSend(new Uint8Array([CMD_SAVE,slot,0,0]));toast(`Preset ${slot+1} saved`);}
function applyStateBlob(data){
  const b=new Uint8Array(data);if(b.length<60)return;
  for(let fxId=0;fxId<10;fxId++){
    const base=fxId*6;fxState[fxId].enabled=b[base]!==0;
    for(let p=0;p<5;p++)fxState[fxId].p[p]=b[base+1+p];
  }
  buildPedals();toast('State synced from device');
}

/* ─── TAB AUDIO CAPTURE ─────────────────────────────────── */
const AUDIO_PKT_HEADER=0xA0,AUDIO_CHUNK_SAMPLES=1024;
let captureStream=null,captureCtx=null,captureProc=null,captureActive=false;
let bytesSentTotal=0,lastStatsTime=0;

async function toggleCapture(){
  if(captureActive){stopCapture();return;}
  if(!serialPort){toast('Connect USB first');return;}
  await startCapture();
}
async function startCapture(){
  try{
    captureStream=await navigator.mediaDevices.getDisplayMedia({
      video:{width:1,height:1,frameRate:1},
      audio:{channelCount:1,sampleRate:44100,echoCancellation:false,noiseSuppression:false,autoGainControl:false}
    });
    captureStream.getVideoTracks().forEach(t=>t.stop());
    const audioTracks=captureStream.getAudioTracks();
    if(!audioTracks.length){toast('No audio track — check "Share tab audio"');captureStream.getTracks().forEach(t=>t.stop());captureStream=null;return;}
    captureCtx=new AudioContext({sampleRate:44100});
    const source=captureCtx.createMediaStreamSource(captureStream);
    captureProc=captureCtx.createScriptProcessor(AUDIO_CHUNK_SAMPLES,1,1);
    captureProc.onaudioprocess=(e)=>{
      if(!serialPort){stopCapture();return;}
      sendAudioChunk(e.inputBuffer.getChannelData(0));
    };
    source.connect(captureProc); // NOT connected to destination — speaker stays silent
    captureActive=true;bytesSentTotal=0;lastStatsTime=performance.now();
    document.getElementById('btnCapture').textContent='■ STOP CAPTURE';
    document.getElementById('uacDot').classList.add('stream');
    toast('Capturing tab audio → ESP32 (mute speakers manually if needed)');
    captureStream.getAudioTracks()[0].addEventListener('ended',()=>stopCapture());
  }catch(e){if(e.name!=='NotAllowedError')toast('Capture error: '+e.message);captureStream=null;}
}
function stopCapture(){
  if(captureProc){captureProc.disconnect();captureProc=null;}
  if(captureCtx){captureCtx.close();captureCtx=null;}
  if(captureStream){captureStream.getTracks().forEach(t=>t.stop());captureStream=null;}
  captureActive=false;
  document.getElementById('btnCapture').textContent='▶ CAPTURE TAB';
  document.getElementById('uacDot').classList.remove('stream');
  document.getElementById('streamStats').textContent='';
  toast('Capture stopped');
}
function sendAudioChunk(floats){
  const pcm16=new Int16Array(floats.length);
  for(let i=0;i<floats.length;i++){const c=Math.max(-1,Math.min(1,floats[i]));pcm16[i]=c<0?(c*32768)|0:(c*32767)|0;}
  const pcmBytes=new Uint8Array(pcm16.buffer);
  const len=pcmBytes.length;
  const pkt=new Uint8Array(3+len);
  pkt[0]=AUDIO_PKT_HEADER;pkt[1]=(len>>8)&0xFF;pkt[2]=len&0xFF;pkt.set(pcmBytes,3);
  serialSend(pkt);
  bytesSentTotal+=pkt.length;
  const now=performance.now();
  if(now-lastStatsTime>=1000){
    document.getElementById('streamStats').textContent=((bytesSentTotal/(now-lastStatsTime))*1000/1024).toFixed(1)+' KB/s';
    bytesSentTotal=0;lastStatsTime=now;
  }
}

/* ─── YOUTUBE SEARCH ────────────────────────────────────── */
let searchResults=[],activeVideoId=null;
async function doSearch(){
  const apiKey='YOUR_YOUTUBE_API_KEY_HERE';
  const q=document.getElementById('searchInput').value.trim();
  if(!apiKey){toast('Enter your YouTube API key');return;}
  if(!q){toast('Enter a search term');return;}
  document.getElementById('resultsHeader').textContent='SEARCHING…';
  document.getElementById('resultsList').innerHTML='<div class="results-empty">Searching…</div>';
  try{
    const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=12&key=${encodeURIComponent(apiKey)}`;
    const res=await fetch(url);const data=await res.json();
    if(data.error){toast('YouTube API: '+data.error.message);document.getElementById('resultsHeader').textContent='ERROR';return;}
    searchResults=data.items||[];renderResults();
  }catch(e){toast('Search failed: '+e.message);}
}
function renderResults(){
  const list=document.getElementById('resultsList'),hdr=document.getElementById('resultsHeader');
  if(!searchResults.length){list.innerHTML='<div class="results-empty">No results</div>';hdr.textContent='NO RESULTS';return;}
  hdr.textContent=searchResults.length+' RESULTS';
  list.innerHTML=searchResults.map(item=>{
    const id=item.id.videoId;
    const title=item.snippet.title.replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
    const thumb=item.snippet.thumbnails?.default?.url||'';
    const ch=item.snippet.channelTitle;
    return `<div class="result-item${id===activeVideoId?' active':''}" onclick="loadVideo('${id}','${title.replace(/'/g,"\\'")}')" data-vid="${id}">
      <img class="result-thumb" src="${thumb}" alt="" loading="lazy">
      <div class="result-info">
        <div class="result-title">${title}</div>
        <div class="result-meta">${ch}</div>
      </div></div>`;
  }).join('');
}

/* ─── YOUTUBE PLAYER ────────────────────────────────────── */
let ytPlayer=null,ytReady=false,ytApiReady=false,ytTimerID=null,pendingVideoId=null,isSeeking=false;

function onYouTubeIframeAPIReady(){ytApiReady=true;if(pendingVideoId)createPlayer(pendingVideoId);}

function createPlayer(videoId){
  if(ytPlayer){ytPlayer.loadVideoById(videoId);return;}
  const noVid=document.getElementById('noVideo');if(noVid)noVid.style.display='none';
  const originOk=location.protocol.startsWith('http');
  const pv={autoplay:1,controls:1,disablekb:0,fs:0,modestbranding:1,rel:0,iv_load_policy:3,playsinline:1};
  if(originOk)pv.origin=location.origin;
  ytPlayer=new YT.Player('ytPlayerDiv',{videoId,height:'100%',width:'100%',playerVars:pv,
    events:{
      onReady:(e)=>{ytReady=true;e.target.playVideo();startProgressTimer();},
      onStateChange:onYTStateChange,
      onError:(e)=>toast('Player error: '+e.data)
    }});
}
function loadVideo(videoId,title){
  activeVideoId=videoId;
  document.querySelectorAll('.result-item').forEach(el=>el.classList.toggle('active',el.dataset.vid===videoId));
  const np=document.getElementById('nowPlaying');np.style.display='block';np.textContent=title;
  if(!ytApiReady){pendingVideoId=videoId;return;}
  if(!ytPlayer||!ytReady){createPlayer(videoId);return;}
  ytPlayer.loadVideoById(videoId);
}
function onYTStateChange(e){
  const btn=document.getElementById('btnPlayPause');
  if(e.data===YT.PlayerState.PLAYING)btn.textContent='⏸';
  else if(e.data===YT.PlayerState.ENDED){btn.textContent='▶';resetProgress();}
  else btn.textContent='▶';
}
function togglePlay(){
  if(!ytPlayer||!ytReady)return;
  ytPlayer.getPlayerState()===YT.PlayerState.PLAYING?ytPlayer.pauseVideo():ytPlayer.playVideo();
}
function seekRel(d){if(!ytPlayer||!ytReady)return;ytPlayer.seekTo(Math.max(0,(ytPlayer.getCurrentTime()||0)+d),true);}
function onSeekInput(el){
  isSeeking=true;
  const dur=ytPlayer&&ytReady?ytPlayer.getDuration():0;
  const cur=(el.value/100)*dur;
  document.getElementById('timeCur').textContent=fmtTime(cur);
  document.getElementById('timeRem').textContent='-'+fmtTime(Math.max(0,dur-cur));
  el.style.setProperty('--pct',el.value+'%');
}
function onSeekChange(el){
  if(!ytPlayer||!ytReady){isSeeking=false;return;}
  ytPlayer.seekTo((el.value/100)*(ytPlayer.getDuration()||0),true);isSeeking=false;
}
function startProgressTimer(){
  if(ytTimerID)clearInterval(ytTimerID);
  ytTimerID=setInterval(()=>{
    if(!ytPlayer||!ytReady||isSeeking)return;
    try{
      const cur=ytPlayer.getCurrentTime()||0,dur=ytPlayer.getDuration()||0;
      const pct=dur>0?(cur/dur*100):0;
      document.getElementById('timeCur').textContent=fmtTime(cur);
      document.getElementById('timeRem').textContent=dur>0?'-'+fmtTime(dur-cur):'–';
      document.getElementById('timeTot').textContent=fmtTime(dur);
      const sl=document.getElementById('seekSlider');sl.value=pct.toFixed(1);sl.style.setProperty('--pct',pct.toFixed(1)+'%');
    }catch(e){}
  },500);
}
function resetProgress(){
  document.getElementById('timeCur').textContent='0:00';
  document.getElementById('timeRem').textContent='–';
  const sl=document.getElementById('seekSlider');sl.value=0;sl.style.setProperty('--pct','0%');
}
function fmtTime(sec){
  sec=Math.max(0,Math.floor(sec));
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  if(h>0)return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

/* ─── TOAST ─────────────────────────────────────────────── */
let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}

/* ─── INIT ──────────────────────────────────────────────── */
buildPedals();
buildPresets();

window.addEventListener('keydown',e=>{
  if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;
  const n=parseInt(e.key);
  if(!isNaN(n)){const idx=n===0?9:n-1;if(idx<EFFECTS.length)toggleFx(EFFECTS[idx].id);}
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowLeft')seekRel(-5);
  if(e.code==='ArrowRight')seekRel(10);
});
</script>
